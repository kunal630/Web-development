<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-website</title>
    <style>
        body{
            background-color: rgb(237, 132, 150);
        }
        .logo {
            /* width: 40px;
            height: 10px; */
            background-color: tan;
            display: flex;
        }

        .right ul li {
            list-style: none;
        }

        .right ul {
            display: flex;
            gap: 34px;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 2px solid rgb(90, 3, 89);
            border-radius: 34px;
            background-color: pink;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="logo.png" alt="not found">
            </div>
            <div class="right">
                <ul>
                    <li><span>Product</span> <img src="icon.png" alt="" width="24px"></li>
                    <li><span>Pricing</span><img src="icon.png" alt=""width="24px"></li>
                    <li><span>Resources</span><img src="icon.png" alt=""width="24px"></li>
                    <li><span>About us</span><img src="icon.png" alt=""width="24px"></li>
                </ul>
            </div>
        </nav>
    </header>

</body>

</html>
