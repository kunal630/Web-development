<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multi color website</title>
    <style>
        :root{
            --primary--color:rgb(19, 6, 93);
            --secondary--color:rgb(155, 124, 235);
            --text-color:white;
        }
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: var(--secondary--color);
        }
        nav{
            margin: 15px;
            padding:15px;
            background-color:var(--primary--color) ;
            border: 2px solid rgb(186, 236, 236);
        }
        nav ul li{
            display: inline;
            padding: 10px;
            list-style: none;
            color: var(--text-color);
        
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>Home</li>
                <li>Contact</li>
                <li>Services</li>
                <li>About us</li>

            </ul>
        </nav>
    </header>

</body>

</html>
