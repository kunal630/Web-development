<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Class Selectors -->
    <div class="firstdiv">hey iam first div</div>

    <!-- id selector -->
     <div id="idselector">Kunal Rajendra Punde</div>

     <!-- child selector -->
      <span>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Excepturi, consequuntur?</p>
      </span>

      <!-- Desendant Selector -->
       <div>
        <span>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Tempore, maiores?</p>
        </span>
       </div>

       <!-- Universal Selector -->
        <a href="http://www.google.com">Visit The Google</a>
        <a href="http://www.facebook.com">visit the facebook</a>

        <main>
            <h3>Lorem ipsum dolor sit.</h3>
            <h3>Lorem, ipsum dolor.</h3>
        </main>
</body>
</html>
