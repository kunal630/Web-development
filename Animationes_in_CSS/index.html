<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animationes In CSS</title>
    <style>
        .cont{
            background-color: rgb(85, 4, 112);
            height: 50vh;
            width: 40vw;
        }
        .box{
            background-color: teal;
            height: 5vh;
            width: 4vw;
            border: 1px solid wheat;
            animation-name: kunal;
            animation-duration: 5s;
            animation-timing-function: ease-in-out;
            animation-delay: 2s;
            animation-iteration-count: infinite;


        }
        @keyframes kunal {
            from{
                background-color: azure;
                color: rgb(25, 25, 23);
                transform: rotate3d(0, 1, 0.5, 3.142rad);
                
            }to{
                transform: translatex(80vw) translatey(80vh) scale(4) skewX(15deg);
                /* transform: skewX(2deg); */
                background-color: rgb(11, 185, 19);
                font-weight: bolder;
                font-family: Arial, Helvetica, sans-serif;
                border: 5px solid pink;
                border-radius: 55px;
            }
            
        }
    </style>
</head>
<body>
    <div class="cont">
        <div class="box">box</div>
    </div>
</body>
</html>
